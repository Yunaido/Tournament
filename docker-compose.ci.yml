services:
  web:
    image: onepiece-tournament:test
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - SECRET_KEY=ci-test-secret-key-not-for-production
      - POSTGRES_DB=onepiece
      - POSTGRES_USER=onepiece
      - POSTGRES_PASSWORD=onepiece
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - SEED_DATA=1
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=onepiece
      - POSTGRES_USER=onepiece
      - POSTGRES_PASSWORD=onepiece
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onepiece"]
      interval: 3s
      timeout: 3s
      retries: 10
