name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Django checks & lint ─────────────────────────────────────
  django-check:
    name: Django System Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Django system checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
        run: python manage.py check --deploy 2>&1 || python manage.py check

  # ── Build Docker image ───────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: onepiece-tournament:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image for E2E job
        run: docker save onepiece-tournament:test -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ── Playwright E2E tests ─────────────────────────────────────
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Start services
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for web server to be ready
        run: |
          echo "Waiting for Django to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/ > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            echo "  Attempt $i/30 — not ready yet..."
            sleep 2
          done
          echo "Server did not start in time"
          docker compose -f docker-compose.ci.yml logs web
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright dependencies
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          BASE_URL: http://localhost:8000
        run: npx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
