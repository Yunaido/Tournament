version: 2
updates:
  # Python (pip) dependencies
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "deps(pip):"

  # Node.js (npm) dependencies for Playwright E2E
  - package-ecosystem: npm
    directory: /e2e
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "deps(npm):"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "deps(actions):"

  # Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "deps(docker):"
