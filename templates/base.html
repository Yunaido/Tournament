<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OP TCG Tournament{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body {
            min-height: 100vh;
        }

        .trophy {
            color: #ffd700;
        }

        .winner-row {
            background-color: rgba(255, 215, 0, 0.12) !important;
        }

        .badge-win {
            background-color: #2a8f37;
        }

        .badge-loss {
            background-color: #af4034;
        }

        .badge-draw {
            background-color: #e6a817;
        }

        .badge-bye {
            background-color: #6c757d;
        }

        .wdl-bar {
            display: flex;
            height: 1.4rem;
            border-radius: 0.3rem;
            overflow: hidden;
            min-width: 100px;
        }

        .wdl-bar .win {
            background: #2a8f37;
        }

        .wdl-bar .draw {
            background: #e6a817;
        }

        .wdl-bar .loss {
            background: #af4034;
        }

        .wdl-bar span {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'tournament_list' %}">
                🏴‍☠️ OP TCG Tournaments
            </a>
            <div class="d-flex align-items-center gap-3">
                {% if user.is_authenticated %}
                <a href="{% url 'accounts:invite_list' %}" class="text-light text-decoration-none">📨 Invites</a>
                <a href="{% url 'accounts:profile' %}" class="text-light text-decoration-none">
                    {{ user.profile.display_name }}
                </a>
                <form method="post" action="{% url 'accounts:logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
                {% else %}
                <a href="{% url 'accounts:login' %}" class="btn btn-outline-light btn-sm">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
