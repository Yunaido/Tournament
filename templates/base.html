<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OP TCG Tournament{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'img/favicon-32x32.png' %}" sizes="32x32">
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}" sizes="16x16 32x32 48x48">
    <link rel="apple-touch-icon" href="{% static 'img/apple-touch-icon.webp' %}">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
</head>

<body>
    <canvas id="op-fx-canvas" aria-hidden="true"></canvas>
    <button id="op-fx-toggle" type="button" aria-label="Toggle visual effects" title="Visual effects ON – click to disable">✨</button>
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom mb-4" style="background:transparent;">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{% url 'tournament_list' %}">
                <img src="{% static 'img/logo.webp' %}" alt="" width="48" height="48" class="rounded" style="object-fit:cover;">
                OP TCG Tournaments
            </a>
            <div class="d-flex align-items-center gap-3">
                {% if user.is_authenticated %}
                <a href="{% url 'accounts:invite_list' %}" class="text-light text-decoration-none">📨 Invites</a>
                <a href="{% url 'accounts:profile' %}" class="text-light text-decoration-none d-flex align-items-center gap-1">
                    <img src="{{ user.profile.avatar_url }}" alt="" class="rounded-circle" width="24" height="24"
                        style="object-fit:cover;">
                    {{ user.profile.display_name }}
                </a>
                <form method="post" action="{% url 'accounts:logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
                {% else %}
                <a href="{% url 'accounts:login' %}" class="btn btn-outline-light btn-sm">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/ocean-fx.js' %}"></script>
</body>

</html>
