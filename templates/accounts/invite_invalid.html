{% extends "base.html" %}
{% block title %}Invalid Invite{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card">
            <div class="card-body py-5">
                <h2 class="mb-3">🚫 Invite Invalid</h2>
                <p class="text-muted">
                    This invite link has expired, been deactivated, or reached its usage limit.
                </p>
                <p>Ask the tournament organizer for a new invite link.</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-outline-light">Already have an account? Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
